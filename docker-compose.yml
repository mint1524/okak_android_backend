services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-okak}
      POSTGRES_USER: ${POSTGRES_USER:-okak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-okak}
    volumes:
      - okak_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-okak}"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DB_URL: "jdbc:postgresql://db:5432/${POSTGRES_DB:-okak}"
      DB_USER: "${POSTGRES_USER:-okak}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-okak}"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env}"
      JWT_ISSUER: "okak"
      JWT_AUDIENCE: "okak-users"
      JWT_REALM: "okak"
      JWT_EXPIRES_MIN: "60"
      USE_IN_MEMORY_DB: "false"
      LLM_PROVIDER: "${LLM_PROVIDER:-mock}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-llama-3.3-70b-versatile}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.groq.com/openai/v1}"
      LLM_SYSTEM_PROMPT: "${LLM_SYSTEM_PROMPT:-Ты дружелюбный ассистент. Отвечай по-русски, кратко и по делу.}"
      LLM_MAX_TOKENS: "${LLM_MAX_TOKENS:-512}"
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.7}"
      MAIL_SERVICE_BASE_URL: "${MAIL_SERVICE_BASE_URL:-}"
      MAIL_SERVICE_TOKEN: "${MAIL_SERVICE_TOKEN:-}"
      MAIL_REQUEST_HMAC_SECRET: "${MAIL_REQUEST_HMAC_SECRET:-}"
      MAIL_VERIFICATION_REQUIRED: "${MAIL_VERIFICATION_REQUIRED:-false}"
      MAIL_DEV_RETURN_CODE: "${MAIL_DEV_RETURN_CODE:-false}"
      MAIL_CODE_TTL_MINUTES: "${MAIL_CODE_TTL_MINUTES:-10}"
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  okak_db:
